# acbot configuration.
# Copy to config.yaml next to this file and fill in your values.
# The Discord bot token is NOT stored here: set the ACBOT_DISCORD_TOKEN
# environment variable (see README for service setup).

discord:
  # Server (guild) the bot operates in. Commands are registered guild-scoped
  # so they appear instantly.
  guild_id: 000000000000000000

  # Users need at least one of these roles to run state-changing commands
  # (start/stop/restart, preset apply, entry edits, settings). Read-only
  # commands (/server status, /join, /lb ...) are open to everyone.
  admin_role_ids:
    - 000000000000000000

  # Channel that holds the auto-updating "server status" message
  # (created/refreshed with /status pin).
  status_channel_id: 000000000000000000

  # Optional: channel where every admin action is logged. Remove or set to
  # null to log to file only.
  audit_channel_id: null

  # Optional: channel where car uploads (from the /upload link page) post an
  # approve/reject prompt. One admin's approval installs the car; leave null
  # to disable the prompt (uploads are still held but nobody is notified).
  upload_channel_id: null

paths:
  # Full Assetto Corsa install (the bot reads content\cars\<car>\skins\<skin>
  # from here for car/skin options).
  ac_root: 'C:\Program Files (x86)\Steam\steamapps\common\assettocorsa'

  # Vanilla dedicated server folder (contains acServer.exe).
  server_dir: 'C:\Program Files (x86)\Steam\steamapps\common\assettocorsa\server'

  # Optional: AssettoServer install folder (contains AssettoServer.exe).
  # Only needed when server.backend is "assettoserver".
  assettoserver_dir: null

  # Content Manager server presets folder. "auto" tries the known CM
  # locations; run `python -m acbot doctor` to see what it finds, and set an
  # explicit path if auto-detection misses.
  cm_presets_dir: auto

  # Where the bot keeps its own files (staged config, leaderboard db, logs,
  # state). Relative paths are resolved against the bot folder.
  data_dir: data

server:
  # "vanilla" (acServer.exe) or "assettoserver" (AssettoServer.exe)
  backend: vanilla

  # Public IP used in join links. "auto" resolves it once at startup via
  # api.ipify.org; set explicitly if the VM has a static/forwarded address.
  public_ip: auto

  # Minimum seconds between start/stop/restart actions.
  restart_cooldown_s: 60

  # Seconds between refreshes of the persistent status message.
  status_poll_s: 30

  # When the bot starts (e.g. on VM boot), automatically launch the AC
  # server too, reusing whatever preset was last staged (persists across
  # bot restarts once you've run /preset apply at least once). If a stray
  # AC server is already running, autostart backs off and just logs it
  # rather than touching it.
  autostart: false

  # UDP plugin wiring, enforced on every staged config so the live layer
  # always works regardless of what the preset says:
  #   - the server listens for plugin traffic on udp_plugin_server_port
  #   - the bot listens for server events on udp_plugin_listen
  udp_plugin_server_port: 11000
  udp_plugin_listen: 127.0.0.1:12000

downloads:
  # Port the content download HTTP server listens on (internally).
  # If port-forwarded differently (e.g. 8082 → 8083), set download_port_external
  # so Discord links use the correct public port.
  port: 8082
  
  # Optional: public-facing port if different from internal port (e.g. due to
  # port forwarding). Leave blank or null to use 'port' for both internal and external.
  port_external: null

web:
  # Password-protected admin web UI onto the same backend as the bot. It runs
  # alongside the bot (acbot run) and can also run on its own without Discord
  # (acbot web). Turn it off to disable both.
  enabled: true

  # Interface + port to listen on. 0.0.0.0 exposes it on the LAN/internet; use
  # 127.0.0.1 to keep it host-only. Forward this port if you want remote access.
  host: 0.0.0.0
  port: 8090

  # Login method: "password" (one shared password), "discord" (each visitor
  # logs in with Discord and is let in only if they're a member of the server
  # in discord.guild_id — no shared password to leak, and access revokes itself
  # when someone leaves the server), or "none" (NO login at all — the whole
  # admin UI, including start/stop and settings, is open to anyone who can reach
  # it; only use this when access is already locked down another way, e.g.
  # host: 127.0.0.1, a firewall/LAN, or a reverse proxy that does its own auth).
  auth: password

  # --- auth: password ---
  # The single shared password. Prefer the ACBOT_WEB_PASSWORD environment
  # variable (this file is readable by anyone with file access); this is only a
  # fallback. Leave null and set the env var instead.
  password: null

  # --- auth: discord ---
  # From your Discord application (https://discord.com/developers/applications):
  # OAuth2 → Client ID + Client Secret, and add a redirect of
  #   http(s)://<your-host>:8090/auth/discord/callback
  # under OAuth2 → Redirects. The guild checked is discord.guild_id above.
  discord_client_id: null
  # Prefer the ACBOT_WEB_DISCORD_SECRET env var over putting the secret here.
  discord_client_secret: null
  # Usually leave null — it's derived from the request. Set it only if the
  # auto-derived URL wouldn't match the redirect you registered on Discord
  # (e.g. behind a proxy/domain): e.g. https://acbot.example.com/auth/discord/callback
  discord_redirect_uri: null

  # Lockout: after this many failed logins an IP is banned for ban_hours. The
  # ban list is data/web_bans.txt — delete a line there to lift a ban (no
  # restart needed). Loopback (127.0.0.1 / ::1) is NEVER banned, so you can't
  # lock yourself out from the host.
  max_attempts: 3
  ban_hours: 24

  # Extra IPs that can never be banned (in addition to loopback), e.g. your
  # office/home IP. One per line.
  never_ban: []

  # How long a successful login stays signed in (hours).
  session_hours: 12

  # Serve the UI over HTTPS so the password/session aren't sent in the clear.
  # Recommended whenever the UI is reachable off the local host.
  tls: false
  # Your own PEM certificate + private key (e.g. from a CA or internal PKI).
  # Leave both null and set tls: true to auto-generate a long-lived self-signed
  # cert in the data dir on first run (browsers show a one-time trust warning,
  # but traffic is still encrypted). Relative paths resolve next to this file.
  tls_cert: null
  tls_key: null

assettoserver:
  # Optional per-version wiring for AssettoServer extras. AS is actively
  # developed and key names change; check your extra_cfg.yml.
  #
  # Dot-path into cfg/extra_cfg.yml toggled by /settings collisions,
  # e.g. "IgnoreCollisions" or "Plugin.SomeKey". Leave null if your AS
  # version has no such switch (the command will explain that).
  collisions_yaml_key: null
  # Console command template for live time changes (sent to AS stdin),
  # e.g. "/settime {hour:02d}:{minute:02d}". Leave null to fall back to
  # staged SUN_ANGLE + restart.
  settime_console_template: null
